<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arabix CMS</title>
  </head>
  <body>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.addEventListener("load", function () {
        CMS.init({
          config: {
            backend: {
              name: "github",
              repo: "paule2york/Arabix",
              branch: "main"
            },
            media_folder: "assets/uploads",
            public_folder: "/assets/uploads",
            collections: [
              {
                name: "site_data",
                label: "Site Data",
                files: [
                  {
                    file: "data/portfolio.json",
                    name: "portfolio",
                    label: "Portfolio Projects",
                    fields: [
                      {
                        label: "Categories",
                        name: "categories",
                        widget: "list",
                        fields: [
                          { label: "ID", name: "id", widget: "string" },
                          { label: "English Label", name: "en", widget: "string" },
                          { label: "Arabic Label", name: "ar", widget: "string" }
                        ]
                      },
                      {
                        label: "Projects",
                        name: "projects",
                        widget: "list",
                        fields: [
                          { label: "Category ID", name: "category", widget: "string" },
                          { label: "Image", name: "image", widget: "image", required: false },
                          { label: "Title", name: "title", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] },
                          { label: "Timeframe", name: "timeframe", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] },
                          { label: "Budget", name: "budget", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] }
                        ]
                      }
                    ]
                  },
                  {
                    file: "data/shop.json",
                    name: "shop",
                    label: "Shop Themes",
                    fields: [
                      {
                        label: "Categories",
                        name: "categories",
                        widget: "list",
                        fields: [
                          { label: "ID", name: "id", widget: "string" },
                          { label: "English Label", name: "en", widget: "string" },
                          { label: "Arabic Label", name: "ar", widget: "string" }
                        ]
                      },
                      {
                        label: "Themes",
                        name: "products",
                        widget: "list",
                        fields: [
                          { label: "Category ID", name: "category", widget: "string" },
                          { label: "Image", name: "image", widget: "image", required: false },
                          { label: "Title", name: "title", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] },
                          { label: "Price", name: "price", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] },
                          { label: "Delivery", name: "timeframe", widget: "object", fields: [
                            { label: "English", name: "en", widget: "string" },
                            { label: "Arabic", name: "ar", widget: "string" }
                          ] },
                          { label: "Description", name: "description", widget: "object", fields: [
                            { label: "English", name: "en", widget: "text" },
                            { label: "Arabic", name: "ar", widget: "text" }
                          ] }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
        });
      });
    </script>
  </body>
</html>
